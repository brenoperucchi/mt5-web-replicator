# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
postgres: &postgres
  adapter: postgresql
  encoding: unicode
  pool: 200
  timeout: 15000
  port: 5434


default: &default
  adapter: postgresql
  encoding: unicode
  host: localhost
  pool: 200
  timeout: 15000

test: &test
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 15000

# test:
#   <<: *test
#   database: db/test.sqlite3
#   host: localhost

test:
  <<: *postgres
  database: signalforex_test
  username: signalforex
  password: <%= Rails.application.credentials[:secret_database] %>
  host: localhost


development:
  <<: *default
  database: signalforex
  username: signalforex
  password: <%= Rails.application.credentials[:secret_database] %>
  host: localhost

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.

production:
  <<: *postgres
  database: signalforex
  username: signalforex
  password: <%= Rails.application.credentials[:secret_database] %>
  host: localhost
