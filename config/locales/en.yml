          title1: Replicate Operations
          title2: Trades
          title3: from MT4/MT5 in Anywhere in the World
          title4: Order replication system, manual entries and trading signals, ensuring efficient and integrated operations management.
          title5: 30 day free trial.
          title6: No credit card required to start trial.
          title7: Features
          title8: Get more information and management of your operations
          title9: Order Replication via MetaTraders
          title10: "Full Compatibility: Automatically copy your strategies between MT4 and MT5 platforms with ease."
          title11: "Partial Exits: Efficiently execute partial exits directly in the replication system."
          title12: "Copying Pending or Market Orders: All orders, whether pending or market, are copied automatically."
          title13: Insights Dashboard
          title14: "Portfolio Insights: Track detailed performance of each portfolio in one place."
          title15: "Operational Insights: View comprehensive insights by trade, account, and Magic Number."
          title16: Link to Sample Dashboard
          title17: Portfolio Management
          title18: "Magic Number Restriction: Block specific Magic Numbers that will not be copied, ensuring customization."
          title19: "Volume Control by Account: Adjust the operation volume for each account individually, according to the strategy."
          title20: "Copy Account Control: Integrate multiple robots in different accounts, using a single strategy to serve several clients simultaneously."
          title21: Account Control
          title22: "Copy Account Control: Integrate multiple robots in different accounts, using a single strategy to serve several clients simultaneously." 
          title23: "Magic Number Restriction: Define which Magic Numbers will not be copied in each portfolio, ensuring detailed control."
          title24: "Choose Magic Number: Choose the specific Magic Number or keep the original copy, according to your needs."
          title25: Invoice Management
          title26: "Flexible Billing Plans: Offer plans with different types of recurrence, allowing fixed monthly payments or billing by percentage of earnings."                 
          title27: Charging Management
          title28: "Automatic Billing Management: View and configure online billing methods (MercadoPago/Stripe) for your clients, ensuring efficient financial management."
