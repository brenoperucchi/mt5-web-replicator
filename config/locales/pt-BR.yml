        title: Nosso sistema foca na replicação exata de ordens de robôs, entradas manuais e sinais de trading, proporcionando uma gestão de trading eficiente e integrada.
        title2: Comece hoje
        title3: Não é necessário nenhum tipo de pagamento
        title4: Regras importantes para o uso do sistema
        resume_title: Leia atentamente todos os itens
        rules1: "O sistema inicialmente irá permitir operações em conta demo. Somente após o periódo de teste de 30 dias de avaliação e com aprovação de nossa equipe que o sistema irá permitir o uso em conta reais, por isso valide dentro deste período."
        rules2: "Caso o seu uso seja a partir de um robô de alta frequência (scalper), confirme se o tempo de abrir e fechar as operações entre o Copy e Slave estão de acordo com os seus parametros."
        rules3: "Tenha sempre um grupo (telegram/whatsapp) com os seus clientes, pois caso aconteça algum problema na conexão servidor e cliente, você poderá informar sobre as informações de ordens fechadas ou abertas"
        rules4: "Use, teste e valide!"
        submit: "Iniciar Teste"
        placeholder_email: Digite seu e-mail
      main:
        app_name: Imentore Copy
        other1: Nosso sistema foca na replicação exata de ordens de robôs, entradas manuais e sinais de trading, proporcionando uma gestão de trading eficiente e integrada.
        other2: 30 dias para testes
        layout:
          title1: Replique Suas
          title2: Operações
          title3: MT4/MT5 de Qualquer lugar do Mundo
          title4: Sistema de replicação de ordens, entradas manuais e sinais de trading, garantindo uma gestão de operações eficiente e integrada.
          title5: 30 de teste gratuito.
          title6: Não necessidade cartão de crédito para iniciar teste.
          title7: Características do Sistema
          title8: Tenha mais informações e gerenciamento de suas operações
          title9: Replicações de Ordens via MetaTraders
          title10: "Compatibilidade Completa: Copie suas estratégias automaticamente entre as plataformas MT4 e MT5 com facilidade."
          title11: "Saídas Parciais: Execute saídas parciais com eficiência, diretamente no sistema de replicação."
          title12: "Cópia de Ordens Pendentes ou a Mercado: Todas as ordens, sejam pendentes ou a mercado, são copiadas de forma automática."
          title13: Dashboard de Informações
          title14: "Estatísticas por Portfólio: Acompanhe o desempenho detalhado de cada portfólio em um único local."
          title15: "Informações Operacionais: Visualize dados completos por operação, conta e Magic Number."
          title16: Link para Dashboard de Exemplo
          title17: Gestão de Portfólios 
          title18: "Restrição de Magic Number: Bloqueie Magic Numbers específicos que não serão copiados, garantindo personalização."
          title19: "Controle de Volume por Conta: Ajuste o volume de operação para cada conta individualmente, conforme a estratégia."
          title20: "Controle de Contas Copy: Integre múltiplos robôs em diferentes contas, utilizando uma única estratégia para atender a diversos clientes simultaneamente."
          title21: Controle Contas
          title22: "Controle de Contas Copy: Integre múltiplos robôs em diferentes contas, utilizando uma única estratégia para atender a diversos clientes simultaneamente."
          title23: "Restrição de Magic Number: Defina quais Magic Numbers não serão copiados em cada portfólio, garantindo controle detalhado."
          title24: "Escolha de Magic Number: Escolha o Magic Number específico ou mantenha o original do copy, conforme sua necessidade."
          title25: Gestão de Faturas
          title26: "Planos de Cobrança Flexíveis: Ofereça planos com diferentes tipos de recorrência, permitindo mensalidades fixas ou cobrança por porcentagem de ganho."
          title27: Gestão de Cobrança
          title28: "Gestão Automática de Cobrança: Visualize e configure ao seu cliente de formas de cobrança Online (MercadoPago/Stripe) para clientes os seus clientes, garantindo uma administração financeira eficiente."
        portfolio: Compartilhe dashboards com seus clientes
        warning: Sistema em versão beta
        navbar:
          home: Início
          request_support: Faça um teste
          sign_in: Acesse
        title:
          main: Sistema de Replicação de Ordens
          imentore: imentore copy
          pricing: preços
          support: suporte
          partner: Seja Parceiro
          request_demo1: Iniciar Teste
          request_demo2: Estamos em fase de testes, neste momento as serão selecionadas alguns clientes para testar e avaliar o nosso sistema como todos os recursos. Após o período de teste o cliente deverá optar por um plano com 10% de desconto na mensalidade no primeiro ano.
        telegram:
          title: Telegram 
          resume: "Incluímos no nosso serviço um bot inovador chamado Alfred, que se conecta ao seu grupo do Telegram. Alfred é projetado para monitorar de forma eficiente as operações de trading, oferecendo atualizações em tempo real e permitindo uma gestão mais dinâmica das suas atividades de trading diretamente pelo Telegram."
          resume2: "Alfred Bot permite que você compartilhe facilmente suas operações de trading no seu grupo do Telegram. Essa funcionalidade não só promove a transparência nas operações, mas também facilita a comunicação e o compartilhamento de estratégias entre os membros do grupo."
          resume3: "Além disso, Alfred está sempre ativo para notificar você e os membros do seu grupo sobre importantes atualizações de trading. Ele informa automaticamente quando uma ordem é aberta, fechada ou sofre alterações, garantindo que todos no grupo estejam sempre informados e atualizados sobre as últimas movimentações do mercado."
        payment:
          title: Cobrança Automática
          resume: O sistema possui um mecanismo de cobrança automática, garantindo que as taxas dos serviços sejam cobradas de forma eficiente. Além disso, ele é capaz de notificar ou até mesmo desabilitar automaticamente os clientes que estiverem em situação de inadimplência, assegurando uma gestão financeira mais tranquila e automatizada.
          resume2: "Nosso sistema oferece uma solução de cobrança automatizada altamente personalizável. Você pode configurar planos de cobrança diferenciados para atender às necessidades específicas de diferentes portfólios ou clientes. A plataforma permite a definição de cobranças tanto por um valor fixo específico quanto por uma porcentagem dos lucros obtidos pelo cliente, oferecendo flexibilidade e conveniência tanto para o gestor quanto para o cliente."
          resume3: "Atualmente, o sistema está integrado com o Mercado Pago e a STRIPE, garantindo um processo de pagamento seguro e eficiente. Essas integrações permitem uma maior variedade de opções de pagamento, facilitando transações financeiras e aprimorando a experiência do usuário."
        copy: 
          resume1: O sistema copiará as entradas de um robô, sinais telegram, ou mesmo entradas de um Trader manual.  
          resume2: Na entradas manuais o cliente poderá continuar usando o seu sistema de trader favorito (Profit, Tryd...), basta que na mesma conta tenha acesso ao Metatrader.
          resume3: O sistema dará todas informações Log entradas tanto da conta COPY quanto das contas SLAVES.
        pricing:
          plan:
            free: Gratuito
            basic: Básico
            business: Negócio
            premium: Premium
          premium:
            title1: Temos serviços exclusivos para clientes premium que necesitam de um sistema com alta demanda. 
            title2: Entre em contato
          title1: Planos
          title2: Nossos planos.
          sign_in: Assine
          trace: "%{limit} Portfólio"
          copy: "%{limit} Contas Copy"
          slave: "%{limit} Contas Slaves"
          charge: Cobrança automatica para clientes
          telegram: "Robo Telegram Bot - Alfred"
          extra: "%{amount} R$ por cada recurso extra"
          announce1: "Todos os planos com %{value}% de desconto por tempo limitado"
          announce2: descontos válidos por 1 ano.
          price: "%{value} "
          month: Por mês
        management: 
          title: Gestão & Portfólios 
          resume: O sistema oferece a capacidade de criar diversos portfólios usando diferentes robôs, cada um identificado por um Magic Number único. Isso permite uma organização eficiente, onde diferentes estratégias de trading podem ser implementadas e gerenciadas separadamente, atendendo às necessidades específicas de cada cliente.
          resume2: 
